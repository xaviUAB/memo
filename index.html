<!DOCTYPE html>
<html lang="ca" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MemoVeus - Idees i Notes al Núvol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        primaryDark: '#4f46e5',
                    },
                    animation: {
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.5); border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: rgba(75, 85, 99, 0.5); }
        
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .slide-up { animation: slideUp 0.3s ease-out forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        audio {
            width: 100%;
            height: 40px;
            outline: none;
        }
        audio::-webkit-media-controls-panel { background-color: #f3f4f6; }
        .dark audio::-webkit-media-controls-panel { background-color: #374151; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 h-screen w-full flex flex-col transition-colors duration-200">
    
    <div class="max-w-md w-full mx-auto h-full flex flex-col relative shadow-2xl bg-white dark:bg-gray-800 overflow-hidden">
        
        <!-- Header -->
        <header class="p-4 flex justify-between items-center border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 z-10">
            <div class="flex items-center space-x-2">
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-purple-500">
                    <i class="fa-solid fa-microphone-lines mr-1 text-primary"></i>MemoVeus
                </h1>
                <div id="cloudStatus" class="flex items-center text-xs text-yellow-500 bg-yellow-100 dark:bg-yellow-900/50 px-2 py-0.5 rounded-full" title="Estat de connexió">
                    <i class="fa-solid fa-cloud-arrow-up mr-1 text-[10px]"></i> <span id="cloudLabel">Connectant...</span>
                </div>
            </div>
            <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                <i class="fa-solid fa-moon text-gray-600 dark:text-gray-300"></i>
            </button>
        </header>

        <!-- Cercador i Filtres -->
        <div class="p-4 bg-gray-50 dark:bg-gray-800/50 flex-shrink-0 z-10">
            <div class="relative mb-3">
                <i class="fa-solid fa-search absolute left-3 top-3 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Cerca idees, títols..." 
                    class="w-full pl-10 pr-4 py-2 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition">
            </div>
            
            <div class="flex gap-2 overflow-x-auto pb-1" id="tagFilterContainer">
                <button class="px-3 py-1 bg-primary text-white text-sm rounded-full whitespace-nowrap active-filter" data-tag="all">Totes</button>
            </div>
        </div>

        <!-- Llista de Notes -->
        <div class="flex-1 overflow-y-auto p-4 space-y-4 pb-32" id="memosList">
            <div id="emptyState" class="h-full flex flex-col items-center justify-center text-gray-400 opacity-70">
                <i class="fa-solid fa-cloud-arrow-down text-6xl mb-4 text-gray-300 dark:text-gray-600"></i>
                <p class="text-lg">Sense idees al núvol.</p>
                <p class="text-sm">Toca el micròfon per començar!</p>
            </div>
        </div>

        <!-- Àrea d'enregistrament -->
        <div class="absolute bottom-0 w-full bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 p-4 pb-6 flex flex-col items-center justify-center shadow-[0_-10px_40px_rgba(0,0,0,0.1)] dark:shadow-[0_-10px_40px_rgba(0,0,0,0.5)] z-20 transition-all" id="recordArea">
            
            <div id="recordingUI" class="hidden flex-col items-center w-full mb-4">
                <p id="recordTimer" class="text-3xl font-mono text-red-500 font-bold mb-2">00:00</p>
                <canvas id="visualizer" class="w-full h-12 rounded-lg bg-gray-100 dark:bg-gray-900"></canvas>
            </div>

            <button id="recordBtn" class="w-16 h-16 rounded-full bg-primary hover:bg-primaryDark text-white shadow-lg flex items-center justify-center text-2xl transition-all transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fa-solid fa-microphone"></i>
            </button>
            <p id="recordLabel" class="text-xs text-gray-500 mt-2">Toca per gravar</p>
        </div>
    </div>

    <!-- Modal per Desar la Nota -->
    <div id="saveModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4 opacity-0 transition-opacity">
        <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-sm p-6 shadow-2xl transform scale-95 transition-transform" id="saveModalContent">
            <h2 class="text-xl font-bold mb-4">Desa la idea al núvol</h2>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Títol</label>
                <input type="text" id="memoTitle" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-primary focus:border-primary bg-transparent dark:text-white outline-none" placeholder="Ex: Idea genial">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Etiquetes (separades per comes)</label>
                <input type="text" id="memoTags" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-primary focus:border-primary bg-transparent dark:text-white outline-none" placeholder="feina, urgent, invent">
                <div id="existingTagsContainer" class="flex flex-wrap gap-2 mt-2 hidden">
                    <!-- Etiquetes ràpides s'ompliran automàticament -->
                </div>
            </div>

            <div class="flex justify-end space-x-3">
                <button id="cancelSaveBtn" class="px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition">Descarta</button>
                <button id="confirmSaveBtn" class="px-4 py-2 rounded-lg bg-primary text-white hover:bg-primaryDark transition flex items-center justify-center min-w-[80px]">
                    <span id="saveBtnText">Desa</span>
                    <i id="saveSpinner" class="fa-solid fa-circle-notch fa-spin hidden"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Esborrar -->
    <div id="deleteModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4 opacity-0 transition-opacity">
        <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-sm p-6 shadow-2xl transform scale-95 transition-transform" id="deleteModalContent">
            <h2 class="text-xl font-bold mb-2 text-red-500">Esborrar idea?</h2>
            <p class="text-gray-600 dark:text-gray-300 mb-6">Aquesta acció eliminarà l'àudio del núvol i no es pot desfer. N'estàs segur?</p>
            <div class="flex justify-end space-x-3">
                <button id="cancelDeleteBtn" class="px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition">Cancel·la</button>
                <button id="confirmDeleteBtn" class="px-4 py-2 rounded-lg bg-red-500 text-white hover:bg-red-600 transition">Esborra</button>
            </div>
        </div>
    </div>

    <!-- Toasts -->
    <div id="toastContainer" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 flex flex-col space-y-2 pointer-events-none w-[90%] max-w-sm items-center"></div>

    <script type="module">
        // Importem les llibreries del núvol de Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Constants i Variables Globals per la Gestió d'Estat i l'App
        let memos = [];
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];
        let currentBlob = null;
        let timerInterval;
        let secondsRecorded = 0;
        let activeTagFilter = 'all';
        let memoToDelete = null;

        // Visualització de so
        let audioContext;
        let analyser;

        // Firebase Vars
        let db;
        let auth;
        let currentUserId = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'memo-veus-app';
        
        // Dom Elements
        const themeToggle = document.getElementById('themeToggle');
        const recordBtn = document.getElementById('recordBtn');
        const recordLabel = document.getElementById('recordLabel');
        const recordingUI = document.getElementById('recordingUI');
        const recordTimer = document.getElementById('recordTimer');
        const visualizer = document.getElementById('visualizer');
        const canvasCtx = visualizer.getContext('2d');
        const memosList = document.getElementById('memosList');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');
        const tagFilterContainer = document.getElementById('tagFilterContainer');
        
        const saveModal = document.getElementById('saveModal');
        const saveModalContent = document.getElementById('saveModalContent');
        const memoTitleInput = document.getElementById('memoTitle');
        const memoTagsInput = document.getElementById('memoTags');
        const existingTagsContainer = document.getElementById('existingTagsContainer');
        const cancelSaveBtn = document.getElementById('cancelSaveBtn');
        const confirmSaveBtn = document.getElementById('confirmSaveBtn');
        const saveBtnText = document.getElementById('saveBtnText');
        const saveSpinner = document.getElementById('saveSpinner');

        const deleteModal = document.getElementById('deleteModal');
        const deleteModalContent = document.getElementById('deleteModalContent');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
        
        const cloudStatus = document.getElementById('cloudStatus');
        const cloudLabel = document.getElementById('cloudLabel');

        
        // Iniciem sessió a la plataforma pel núvol de dades
        async function initializeCloudServices() {
            try {
                // Configuració proporcionada per l'entorn de l'Artifact Canvas
                const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                
                // Prioritzem el token d'usuari per accés a dades privades
                const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                if (initialAuthToken) {
                    await signInWithCustomToken(auth, initialAuthToken);
                } else {
                    await signInAnonymously(auth);
                }
                
                currentUserId = auth.currentUser.uid;
                
                cloudLabel.textContent = "Connectat";
                cloudStatus.classList.replace('text-yellow-500', 'text-green-500');
                cloudStatus.classList.replace('bg-yellow-100', 'bg-green-100');
                cloudStatus.classList.replace('dark:bg-yellow-900/50', 'dark:bg-green-900/50');
                
                // Activem la connexió contínua per carregar notes (Regla 1 de rutes privades)
                startListeningToCloud();

            } catch (error) {
                console.error("Error al núvol:", error);
                cloudLabel.textContent = "Mode Offline";
                cloudStatus.classList.replace('text-yellow-500', 'text-red-500');
                cloudStatus.classList.replace('bg-yellow-100', 'bg-red-100');
                cloudStatus.classList.replace('dark:bg-yellow-900/50', 'dark:bg-red-900/50');
                showToast("S'està treballant sense connexió al núvol.", "error");
            }
        }

        function startListeningToCloud() {
            if (!currentUserId || !db) return;
            // Definició de la ruta privada de Firestore (Regla 1 i 2)
            const memosRef = collection(db, 'artifacts', appId, 'users', currentUserId, 'memos');
            
            // Cridem a tots els memos, els guardem i processem en local
            onSnapshot(memosRef, (snapshot) => {
                memos = [];
                snapshot.forEach(doc => {
                    memos.push({ id: doc.id, ...doc.data() });
                });
                renderMemos();
            }, (error) => {
                console.error("Error de l'escutador al núvol:", error);
                showToast("Error carregant les dades", "error");
            });
        }

        // Sistema d'avisos i foscos
        const toggleTheme = () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            themeToggle.innerHTML = isDark ? '<i class="fa-solid fa-sun text-yellow-400"></i>' : '<i class="fa-solid fa-moon text-gray-600"></i>';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            themeToggle.innerHTML = '<i class="fa-solid fa-sun text-yellow-400"></i>';
        }
        themeToggle.addEventListener('click', toggleTheme);

        const showToast = (message, type = 'success') => {
            const toast = document.createElement('div');
            const bgClass = type === 'success' ? 'bg-green-500' : 'bg-red-500';
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            toast.className = `${bgClass} text-white px-4 py-2 rounded-lg shadow-xl flex items-center justify-center space-x-2 text-sm slide-up w-full`;
            toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
            
            const container = document.getElementById('toastContainer');
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        };

        const formatTime = (seconds) => {
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        };

        // Conversor Audio a Base64 eficient 
        const blobToBase64 = (blob) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        };

        // Conversor ràpid per la descàrrega asíncrona Base64 -> Blob (més ràpid i sòlid)
        const base64ToBlob = (base64) => {
            const parts = base64.split(';base64,');
            const byteString = atob(parts[1]);
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            // Retorna un blob Mp4 perquè hi hagi més compatibilitat d'arxiu en reproductors base
            return new Blob([ab], { type: 'audio/mp4' });
        };

        
        // Calibrador de compressió d'àudio
        const getBestMimeType = () => {
            if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) return 'audio/webm;codecs=opus';
            if (MediaRecorder.isTypeSupported('audio/mp4')) return 'audio/mp4';
            return 'audio/webm';
        };

        const startRecording = async () => {
            try {
                // Demanem el micròfon
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Engeguem els analitzadors visuals
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 64;
                
                // Format adaptat per les pantalles retina
                const dpr = window.devicePixelRatio || 1;
                const rect = visualizer.getBoundingClientRect();
                visualizer.width = rect.width * dpr;
                visualizer.height = rect.height * dpr;
                canvasCtx.scale(dpr, dpr);

                // Configurem el gravador per tenir baix pes i maximitzar els minuts disponibles al Firestore 
                const mimeType = getBestMimeType();
                const recorderOptions = {
                    mimeType: mimeType,
                    audioBitsPerSecond: 16000 // Baixem el bitrate expressament per a veu humana i Cloud Docs (pes reduit)
                };
                
                mediaRecorder = new MediaRecorder(stream, recorderOptions);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    // El Blob de veu ja es queda atrapat aquí
                    currentBlob = new Blob(audioChunks, { type: mimeType });
                    stream.getTracks().forEach(track => track.stop());
                    if(audioContext.state !== 'closed') audioContext.close();
                    openSaveModal();
                };

                mediaRecorder.start();
                isRecording = true;
                
                // Canvi d'estat del botó en UI
                recordBtn.classList.remove('bg-primary', 'hover:bg-primaryDark');
                recordBtn.classList.add('bg-red-500', 'hover:bg-red-600', 'animate-pulse-fast');
                recordBtn.innerHTML = '<i class="fa-solid fa-stop"></i>';
                recordLabel.textContent = "Toca per aturar";
                recordingUI.classList.remove('hidden');
                recordingUI.classList.add('flex');
                
                secondsRecorded = 0;
                recordTimer.textContent = "00:00";
                timerInterval = setInterval(() => {
                    secondsRecorded++;
                    recordTimer.textContent = formatTime(secondsRecorded);
                }, 1000);

                // Bucle de l'animació de l'ona sonora
                const drawVisualizer = () => {
                    if (!isRecording) return;
                    requestAnimationFrame(drawVisualizer);
                    const bufferLength = analyser.frequencyBinCount;
                    const dataArray = new Uint8Array(bufferLength);
                    analyser.getByteFrequencyData(dataArray);
                    
                    const width = visualizer.width / dpr;
                    const height = visualizer.height / dpr;
                    
                    canvasCtx.clearRect(0, 0, width, height);
                    const barWidth = (width / bufferLength) * 2.5;
                    let x = 0;
                    
                    for(let i = 0; i < bufferLength; i++) {
                        const barHeight = (dataArray[i] / 255) * height;
                        canvasCtx.fillStyle = `rgb(99, 102, 241)`; // Color Primary TailWind
                        canvasCtx.fillRect(x, height - barHeight, barWidth, barHeight);
                        x += barWidth + 1;
                    }
                };
                drawVisualizer();

            } catch (err) {
                console.error(err);
                showToast("Necessites donar permís al micròfon", "error");
            }
        };

        const stopRecording = () => {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            isRecording = false;
            clearInterval(timerInterval);
            recordBtn.classList.add('bg-primary', 'hover:bg-primaryDark');
            recordBtn.classList.remove('bg-red-500', 'hover:bg-red-600', 'animate-pulse-fast');
            recordBtn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
            recordLabel.textContent = "Toca per gravar";
            recordingUI.classList.add('hidden');
            recordingUI.classList.remove('flex');
        };

        recordBtn.addEventListener('click', () => isRecording ? stopRecording() : startRecording());


        const openModal = (modalEl, contentEl) => {
            modalEl.classList.remove('hidden');
            modalEl.classList.add('flex');
            setTimeout(() => {
                modalEl.classList.remove('opacity-0');
                contentEl.classList.remove('scale-95');
            }, 10);
        };

        const closeModal = (modalEl, contentEl) => {
            modalEl.classList.add('opacity-0');
            contentEl.classList.add('scale-95');
            setTimeout(() => {
                modalEl.classList.remove('flex');
                modalEl.classList.add('hidden');
            }, 300);
        };

        const updateExistingTagsInModal = () => {
            const allTags = new Set();
            memos.forEach(m => m.tags.forEach(t => allTags.add(t)));
            
            if (allTags.size > 0) {
                existingTagsContainer.classList.remove('hidden');
                existingTagsContainer.innerHTML = '';
                Array.from(allTags).sort().forEach(tag => {
                    const tagBtn = document.createElement('button');
                    tagBtn.className = 'px-3 py-1 text-xs rounded-full bg-indigo-50 border border-indigo-200 text-indigo-700 dark:bg-indigo-900/40 dark:border-indigo-700 dark:text-indigo-200 hover:bg-indigo-100 dark:hover:bg-indigo-800 transition shadow-sm';
                    tagBtn.innerHTML = '<i class="fa-solid fa-plus mr-1 text-[10px]"></i>' + tag;
                    tagBtn.onclick = () => {
                        const currentVal = memoTagsInput.value.trim();
                        if (currentVal) {
                            const currentTags = currentVal.split(',').map(t => t.trim().toLowerCase());
                            if (!currentTags.includes(tag)) memoTagsInput.value = currentVal + ', ' + tag;
                        } else {
                            memoTagsInput.value = tag;
                        }
                    };
                    existingTagsContainer.appendChild(tagBtn);
                });
            } else {
                existingTagsContainer.classList.add('hidden');
            }
        };

        const openSaveModal = () => {
            memoTitleInput.value = `Idea del ${new Date().toLocaleDateString('ca-ES')} a les ${new Date().toLocaleTimeString('ca-ES', {hour: '2-digit', minute:'2-digit'})}`;
            memoTagsInput.value = "";
            updateExistingTagsInModal();
            openModal(saveModal, saveModalContent);
            setTimeout(() => memoTitleInput.focus(), 300);
        };

        cancelSaveBtn.addEventListener('click', () => {
            currentBlob = null;
            closeModal(saveModal, saveModalContent);
            showToast("Nota descartada i esborrada");
        });

        // Event enter pel teclat (Desar Ràpid)
        const handleEnterKey = (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                confirmSaveBtn.click();
            }
        };
        memoTitleInput.addEventListener('keydown', handleEnterKey);
        memoTagsInput.addEventListener('keydown', handleEnterKey);

        // Desar les dades al Núvol (Firestore)
        confirmSaveBtn.addEventListener('click', async () => {
            if (!currentUserId || !db) {
                showToast("Has d'estar connectat per guardar notes", "error");
                return;
            }

            const title = memoTitleInput.value.trim() || "Idea sense títol";
            const tags = memoTagsInput.value.split(',').map(t => t.trim().toLowerCase()).filter(t => t.length > 0);
            
            saveBtnText.classList.add('hidden');
            saveSpinner.classList.remove('hidden');
            confirmSaveBtn.disabled = true;

            try {
                // Cal codificar a Base64 perquè en web el blob es volatilitzaria i en la bd cal text/metadata.
                const base64Audio = await blobToBase64(currentBlob);
                const uniqueId = Date.now().toString();

                const docRef = doc(db, 'artifacts', appId, 'users', currentUserId, 'memos', uniqueId);
                
                await setDoc(docRef, {
                    title: title,
                    date: new Date().toISOString(),
                    tags: tags,
                    audioData: base64Audio,
                    duration: secondsRecorded
                });

                closeModal(saveModal, saveModalContent);
                showToast("Pujat al núvol amb èxit!");
                
            } catch (error) {
                console.error("No es pot guardar al núvol", error);
                showToast("L'arxiu pot ser massa llarg o hi ha un error de connexió", "error");
            } finally {
                saveBtnText.classList.remove('hidden');
                saveSpinner.classList.add('hidden');
                confirmSaveBtn.disabled = false;
            }
        });

        // Procés d'Esborrat
        const promptDelete = (id) => { 
            memoToDelete = id; 
            openModal(deleteModal, deleteModalContent); 
        };
        
        cancelDeleteBtn.addEventListener('click', () => { 
            memoToDelete = null; 
            closeModal(deleteModal, deleteModalContent); 
        });
        
        confirmDeleteBtn.addEventListener('click', async () => {
            if (memoToDelete && currentUserId && db) { 
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', currentUserId, 'memos', memoToDelete);
                    await deleteDoc(docRef);
                    showToast("Esborrat del núvol correctament");
                } catch (e) {
                    showToast("No s'ha pogut esborrar", "error");
                }
                memoToDelete = null; 
            }
            closeModal(deleteModal, deleteModalContent);
        });



        // Procés de baixada directa al fitxer (Delega la decisió de carpeta al navegador)
        const downloadAudio = (base64Data, filename) => {
            const a = document.createElement('a');
            a.style.display = 'none';
            // Converteix a mp4 i força la crida
            const blob = base64ToBlob(base64Data);
            const url = URL.createObjectURL(blob);
            a.href = url;
            a.download = `${filename}.mp4`;
            document.body.appendChild(a);
            
            // Acció asíncrona de desencadenament
            a.click();
            
            setTimeout(() => { 
                document.body.removeChild(a); 
                URL.revokeObjectURL(url); 
                showToast("Descarregant el fitxer...");
            }, 150);
        };

        // Funció Share per a dispositius intel·ligents amb caiguda protegida 
        const shareAudio = async (id) => {
            const memo = memos.find(m => m.id === id);
            if (!memo) return;

            try {
                // Convertim a blob tipus file d'MP4 per missatgeria (WhatsApp/Email)
                const blob = base64ToBlob(memo.audioData);
                const file = new File([blob], `${memo.title}.mp4`, { type: 'audio/mp4' });
                
                // Si l'API Share és nativa, ho envia com arxiu annex. Si no, notifica a l'usuari el bloqueig.
                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file]
                    });
                    showToast("Acció oberta amb èxit!");
                } else {
                    showToast("Aquest navegador no permet l'enviament directe, si us plau fes clic a 'Descarregar' primer.", "error");
                }
            } catch (err) {
                // L'usuari ha premut "X" al menú o el menú no s'ha obert
                console.log("Acció cancel·lada:", err);
            }
        };

        // Renderitzat principal seguint regles manuals de frontend (Regla 2 FireStore on memòria gestiona ordre)
        const renderMemos = () => {
            memosList.innerHTML = '';
            const searchTerm = searchInput.value.toLowerCase();

            // Filtrar localment i invertir el temps per veure el mes nou a dalt
            const filteredMemos = memos.filter(memo => {
                const matchesSearch = memo.title.toLowerCase().includes(searchTerm) || memo.tags.some(t => t.includes(searchTerm));
                const matchesTag = activeTagFilter === 'all' || memo.tags.includes(activeTagFilter);
                return matchesSearch && matchesTag;
            });

            if (filteredMemos.length === 0) {
                if (memos.length === 0) {
                    emptyState.classList.remove('hidden');
                } else {
                    memosList.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-400 opacity-70 py-10"><i class="fa-solid fa-magnifying-glass text-4xl mb-4"></i><p>No s'han trobat resultats.</p></div>`;
                    emptyState.classList.add('hidden');
                }
            } else {
                emptyState.classList.add('hidden');
                // Ordenar per més recent primer
                filteredMemos.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(memo => {
                    const dateObj = new Date(memo.date);
                    const dateStr = dateObj.toLocaleDateString('ca-ES') + ' • ' + dateObj.toLocaleTimeString('ca-ES', {hour: '2-digit', minute:'2-digit'});
                    
                    const tagsHtml = memo.tags.map(tag => `<span class="px-2 py-0.5 bg-indigo-100 text-indigo-800 dark:bg-indigo-900/50 dark:text-indigo-200 text-xs rounded-full cursor-pointer hover:bg-indigo-200 transition" onclick="window.setTagFilter('${tag}')">#${tag}</span>`).join('');

                    const memoCard = document.createElement('div');
                    memoCard.className = 'bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700 fade-in';
                    memoCard.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-semibold text-gray-800 dark:text-gray-100 truncate pr-2">${memo.title}</h3>
                            <div class="flex space-x-1 shrink-0 bg-gray-50 dark:bg-gray-700 rounded-full p-1">
                                <button onclick="window.triggerShare('${memo.id}')" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-500 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30 transition" title="Enviar / Compartir">
                                    <i class="fa-solid fa-paper-plane text-sm"></i>
                                </button>
                                <button onclick="window.triggerDownload('${memo.id}')" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-500 hover:text-primary hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition" title="Descarregar MP4">
                                    <i class="fa-solid fa-download text-sm"></i>
                                </button>
                                <button onclick="window.triggerDelete('${memo.id}')" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-500 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 transition" title="Esborrar de núvol">
                                    <i class="fa-solid fa-trash-can text-sm"></i>
                                </button>
                            </div>
                        </div>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mb-3"><i class="fa-regular fa-clock mr-1"></i> ${dateStr} <span class="mx-1">|</span> <i class="fa-solid fa-stopwatch mr-1"></i> ${formatTime(memo.duration || 0)}</p>
                        
                        <audio src="${memo.audioData}" controls class="mb-3 rounded-lg"></audio>
                        
                        <div class="flex flex-wrap gap-1 mt-2">${tagsHtml}</div>
                    `;
                    memosList.appendChild(memoCard);
                });
            }
            updateTagFiltersUI();
        };

        const updateTagFiltersUI = () => {
            const allTags = new Set();
            memos.forEach(m => m.tags.forEach(t => allTags.add(t)));
            
            tagFilterContainer.innerHTML = '';
            
            const btnAll = document.createElement('button');
            btnAll.className = `px-3 py-1 text-sm rounded-full whitespace-nowrap transition-colors border ${activeTagFilter === 'all' ? 'bg-primary border-primary text-white' : 'bg-transparent border-gray-300 text-gray-600 dark:border-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'}`;
            btnAll.innerHTML = '<i class="fa-solid fa-layer-group mr-1.5 text-xs"></i>Totes';
            btnAll.onclick = () => window.setTagFilter('all');
            tagFilterContainer.appendChild(btnAll);

            Array.from(allTags).sort().forEach(tag => {
                const btn = document.createElement('button');
                btn.className = `px-3 py-1 text-sm rounded-full whitespace-nowrap transition-colors border ${activeTagFilter === tag ? 'bg-primary border-primary text-white' : 'bg-transparent border-gray-300 text-gray-600 dark:border-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'}`;
                btn.textContent = '#' + tag;
                btn.onclick = () => window.setTagFilter(tag);
                tagFilterContainer.appendChild(btn);
            });
        };

        searchInput.addEventListener('input', renderMemos);

        // Injectem l'API a nivell de window perquè el HTML l'entengui com es tracta d'un entorn module.
        window.triggerDelete = promptDelete;
        window.triggerDownload = (id) => {
            const memo = memos.find(m => m.id === id);
            if(memo) downloadAudio(memo.audioData, memo.title);
        };
        window.triggerShare = shareAudio;
        window.setTagFilter = (tag) => { activeTagFilter = tag; renderMemos(); };


        // Seqüència d'arrencada de l'App
        window.onload = async () => {
            // Verificar funcionalitat bàsica de gravació
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showToast("El teu navegador no té accés al micròfon", "error");
                recordBtn.disabled = true;
                recordLabel.textContent = "Micròfon no disponible";
            }
            
            // Connectar al núvol automatitzat!
            await initializeCloudServices();
        };

    </script>
</body>
</html>
